# NebulaTrace application demo.
# Prerequisites:
# - Dynatrace Operator and a healthy DynaKube already installed.
# - Istio already installed. The nebulatrace namespace enables sidecar injection.
# - Public container images under your configured IMAGE_REGISTRY.
# - A default StorageClass for PostgreSQL and ActiveMQ PVCs.
apiVersion: v1
kind: Namespace
metadata:
  name: dynatrace
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: nebulatrace
  labels:
    istio-injection: enabled
    nebulatrace.dev/otel: "true"
    nebulatrace.dev/oneagent: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: nebulatrace-data
  labels:
    istio-injection: disabled
    nebulatrace.dev/oneagent: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: nebulatrace-data
data:
  001-schema.sql: |
    create table if not exists crew (
      id serial primary key,
      name text not null
    );
    create table if not exists cargo (
      sku text primary key,
      name text not null,
      stock integer not null
    );
    create table if not exists missions (
      id text primary key,
      title text not null,
      status text not null,
      created_at timestamptz not null default now()
    );
    create table if not exists mission_items (
      id serial primary key,
      mission_id text references missions(id),
      sku text references cargo(sku)
    );
    create table if not exists drone_jobs (
      id serial primary key,
      mission_id text,
      status text not null,
      created_at timestamptz not null default now()
    );
    create table if not exists maintenance_events (
      id serial primary key,
      mission_id text,
      detail text,
      created_at timestamptz not null default now()
    );
    create table if not exists ai_sessions (
      id serial primary key,
      prompt_type text,
      status text,
      created_at timestamptz not null default now()
    );
    create table if not exists entropy_events (
      id serial primary key,
      mode text not null,
      created_at timestamptz not null default now()
    );
    insert into cargo(sku, name, stock) values
      ('QCOIL-7', 'Quantum Coil', 12),
      ('NEB-DRONE', 'Nebula Repair Drone', 8),
      ('COFFEE-SYNTH', 'Coffee Synthesizer Core', 1),
      ('GRAV-BOOT', 'Gravity Boots', 24)
    on conflict (sku) do nothing;
---
apiVersion: v1
kind: Secret
metadata:
  name: data-secrets
  namespace: nebulatrace-data
type: Opaque
stringData:
  POSTGRES_USER: nebulatrace
  POSTGRES_PASSWORD: nebulatrace
  POSTGRES_DB: nebulatrace
  ACTIVEMQ_USER: admin
  ACTIVEMQ_PASSWORD: admin
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nebulatrace-data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.release_stage=demo,primary_tags.env=demo,deployment.release_version=0.1.0,primary_tags.version=0.1.0,primary_tags.app=nebulatrace,k8s.namespace.label.team=service-monitoring,dt.owner=service-monitoring"
            - name: DT_CUSTOM_PROP
              value: "dt.owner=service-monitoring"
          envFrom:
            - secretRef:
                name: data-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nebulatrace-data
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: activemq
  namespace: nebulatrace-data
spec:
  serviceName: activemq
  replicas: 1
  selector:
    matchLabels:
      app: activemq
  template:
    metadata:
      labels:
        app: activemq
      annotations:
        oneagent.dynatrace.com/inject: "true"
        metadata.dynatrace.com/service: activemq
    spec:
      containers:
        - name: activemq
          image: apache/activemq-classic:6.1.7
          ports:
            - name: openwire
              containerPort: 61616
            - name: stomp
              containerPort: 61613
            - name: web
              containerPort: 8161
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.release_stage=demo,primary_tags.env=demo,deployment.release_version=0.1.0,primary_tags.version=0.1.0,primary_tags.app=nebulatrace,k8s.namespace.label.team=service-monitoring,dt.owner=service-monitoring"
            - name: DT_CUSTOM_PROP
              value: "dt.owner=service-monitoring"
          volumeMounts:
            - name: activemq-data
              mountPath: /opt/apache-activemq/data
  volumeClaimTemplates:
    - metadata:
        name: activemq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: activemq
  namespace: nebulatrace-data
spec:
  selector:
    app: activemq
  ports:
    - name: openwire
      port: 61616
      targetPort: 61616
    - name: stomp
      port: 61613
      targetPort: 61613
    - name: web
      port: 8161
      targetPort: 8161
---
apiVersion: apps/v1
