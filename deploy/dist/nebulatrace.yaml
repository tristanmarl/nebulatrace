kind: Service
metadata:
  name: rpc-target
  namespace: nebulatrace
spec:
  selector:
    app: rpc-target
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpc-probe
  namespace: nebulatrace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rpc-probe
  template:
    metadata:
      labels:
        app: rpc-probe
      annotations:
        otlp-exporter-configuration.dynatrace.com/inject: "true"
        metadata.dynatrace.com/service: rpc-probe
    spec:
      containers:
        - name: rpc-probe
          image: ghcr.io/example-org/nebulatrace/rpc-probe:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.release_stage=demo,primary_tags.env=demo,deployment.release_version=0.1.0,primary_tags.version=0.1.0,primary_tags.app=nebulatrace,k8s.namespace.label.team=service-monitoring,dt.owner=service-monitoring"
            - name: DT_CUSTOM_PROP
              value: "dt.owner=service-monitoring"
          envFrom:
            - configMapRef:
                name: nebulatrace-config
---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: nebulatrace-gateway
  namespace: nebulatrace
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bridge-ui
  namespace: nebulatrace
spec:
  hosts:
    - "*"
  gateways:
    - nebulatrace-gateway
  http:
    - match:
        - uri:
            prefix: /api
      route:
        - destination:
            host: command-api.nebulatrace.svc.cluster.local
            port:
              number: 8080
    - route:
        - destination:
            host: bridge-ui.nebulatrace.svc.cluster.local
            port:
              number: 8080
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: credits-api
  namespace: nebulatrace
spec:
  host: credits-api.nebulatrace.svc.cluster.local
  subsets:
    - name: stable
      labels:
        version: stable
    - name: unstable
      labels:
        version: unstable
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: credits-api
  namespace: nebulatrace
spec:
  hosts:
    - credits-api.nebulatrace.svc.cluster.local
  http:
    - route:
        - destination:
            host: credits-api.nebulatrace.svc.cluster.local
            subset: stable
            port:
              number: 8080
---
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: nebulatrace-default
  namespace: nebulatrace
spec:
  tracing:
    - providers:
        - name: dynatrace-otel
      randomSamplingPercentage: 100
  accessLogging:
    - providers:
        - name: envoy
