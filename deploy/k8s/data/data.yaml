apiVersion: v1
kind: Secret
metadata:
  name: data-secrets
  namespace: nebulatrace-data
type: Opaque
stringData:
  POSTGRES_USER: nebulatrace
  POSTGRES_PASSWORD: nebulatrace
  POSTGRES_DB: nebulatrace
  ACTIVEMQ_USER: admin
  ACTIVEMQ_PASSWORD: admin
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nebulatrace-data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: data-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nebulatrace-data
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: activemq
  namespace: nebulatrace-data
spec:
  serviceName: activemq
  replicas: 1
  selector:
    matchLabels:
      app: activemq
  template:
    metadata:
      labels:
        app: activemq
      annotations:
        oneagent.dynatrace.com/inject: "true"
        metadata.dynatrace.com/service: activemq
    spec:
      containers:
        - name: activemq
          image: apache/activemq-classic:6.1.7
          ports:
            - name: openwire
              containerPort: 61616
            - name: stomp
              containerPort: 61613
            - name: web
              containerPort: 8161
          volumeMounts:
            - name: activemq-data
              mountPath: /opt/apache-activemq/data
  volumeClaimTemplates:
    - metadata:
        name: activemq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: activemq
  namespace: nebulatrace-data
spec:
  selector:
    app: activemq
  ports:
    - name: openwire
      port: 61616
      targetPort: 61616
    - name: stomp
      port: 61613
      targetPort: 61613
    - name: web
      port: 8161
      targetPort: 8161
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nebulatrace-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nebulatrace-data
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
